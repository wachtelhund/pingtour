# Fly.io configuration for pingtour.
# See https://fly.io/docs/reference/configuration/ for the full reference.
#
# Replace `app` with the unique name `flyctl apps create` gave you, and
# `primary_region` with your closest region (run `flyctl platform regions`
# for the list — `arn` is Stockholm).

app = "pingtour"
primary_region = "arn"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3939"
  DATA_FILE = "/data/tournament.json"

# Persistent volume for the tournament JSON. Created with:
#   flyctl volumes create pingtour_data --region arn --size 1
[mounts]
  source = "pingtour_data"
  destination = "/data"
  initial_size = "1gb"

[http_service]
  internal_port = 3939
  force_https = true
  # Keep the machine running so WebSockets aren't dropped mid-tournament.
  # Flip these to true / 0 if you want it to sleep when idle.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 150

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
