# AWS Amplify Gen 2 build spec.
#
# `backend` phase deploys the CDK stack defined in `amplify/backend.ts`
# (Lambda + DynamoDB + Function URL) and writes the resulting endpoints
# into `amplify_outputs.json`. The `frontend` phase then builds the
# React bundle with that file in place — the API URL is baked into the
# bundle.

version: 1
backend:
  phases:
    build:
      commands:
        - corepack enable
        - corepack prepare pnpm@10.33.0 --activate
        - pnpm install --frozen-lockfile
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack prepare pnpm@10.33.0 --activate
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - ~/.local/share/pnpm/store/**/*

# SPA fallback so /admin and /join load index.html instead of 404'ing.
# Apply this in the Amplify Console under "Rewrites and redirects":
#
#   Source address:  </^[^.]+$|\.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|woff2|ttf|map|json|webp)$)([^.]+$)/>
#   Target address:  /index.html
#   Type:            200 (Rewrite)
